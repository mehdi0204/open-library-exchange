services:
  postgres:
    image: postgres:16
    container_name: bookswap-db
    environment:
      POSTGRES_DB: echangelivrebd
      POSTGRES_USER: echangelivre
      POSTGRES_PASSWORD: echangelivre
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echangelivre -d echangelivrebd"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: eclipse-temurin:21-jre
    container_name: bookswap-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/echangelivrebd
      QUARKUS_DATASOURCE_USERNAME: echangelivre
      QUARKUS_DATASOURCE_PASSWORD: echangelivre
    volumes:
      - ./target/quarkus-app:/app
    working_dir: /app
    command: ["java", "-jar", "quarkus-run.jar"]

volumes:
  postgres_data: